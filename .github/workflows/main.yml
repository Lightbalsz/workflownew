name: CI Retrain + Save Artifacts + Build Docker (MLflow)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain_and_dockerize:
    runs-on: ubuntu-latest

    env:
      EXPERIMENT_NAME: customer-churn-project
      IMAGE_REPO: customer-churn-project
      IMAGE_TAG: latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          auto-activate-base: true

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy joblib matplotlib dagshub

      # Tracking lokal supaya mlruns tersimpan di repo dan bisa dicari run_id-nya
      - name: Configure MLflow local tracking
        shell: bash -l {0}
        run: |
          echo "MLFLOW_TRACKING_URI=file:${GITHUB_WORKSPACE}/mlruns" >> $GITHUB_ENV

      - name: Retrain model via MLflow Projects
        shell: bash -l {0}
        run: |
          mkdir -p artifacts/latest
          mlflow run ./MLProject \
            --experiment-name customer-churn-project \
            -P data=customer_churn_preprocessing.csv \
            -P target=Churn \
            -P out_dir=../artifacts/latest \
            --env-manager=local

      # Ambil run_id terakhir dari experiment (yang barusan jalan)
      - name: Get latest MLflow run_id
        shell: bash -l {0}
        run: |
          python - <<'PY'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI")
          mlflow.set_tracking_uri(tracking_uri)

          exp_name = os.environ["EXPERIMENT_NAME"]
          client = MlflowClient()

          exp = client.get_experiment_by_name(exp_name)
          if exp is None:
              raise SystemExit(f"Experiment '{exp_name}' not found. tracking_uri={tracking_uri}")

          runs = client.search_runs(
              experiment_ids=[exp.experiment_id],
              order_by=["attributes.start_time DESC"],
              max_results=1
          )
          if not runs:
              raise SystemExit("No runs found in the experiment.")

          run_id = runs[0].info.run_id
          print("LATEST_RUN_ID=", run_id)

          # simpan ke GITHUB_ENV
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"RUN_ID={run_id}\n")
          PY

      # Build docker image dari MLflow model artifact (runs:/RUN_ID/model)
      - name: Build Custom Docker image
        shell: bash -l {0}
        run: |
          echo "Using RUN_ID=${RUN_ID}"
          docker --version

          export LOCAL_IMAGE="loan-mlflow-model:latest"

          # Melakukan build menggunakan Dockerfile baru di root
          docker build --build-arg RUN_ID=${RUN_ID} -t "${LOCAL_IMAGE}" .

          echo "LOCAL_IMAGE=${LOCAL_IMAGE}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        shell: bash -l {0}
        run: |
          # pastikan secrets ada
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "❌ Missing DOCKERHUB_USERNAME / DOCKERHUB_TOKEN in GitHub Secrets"
            exit 1
          fi

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag & Push to Docker Hub (lowercase enforced)
        shell: bash -l {0}
        run: |
          # Docker hub repo name harus lowercase
          USER_LC="$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${IMAGE_REPO}" | tr '[:upper:]' '[:lower:]')"
          TAG_LC="$(echo "${IMAGE_TAG}" | tr '[:upper:]' '[:lower:]')"

          FULL_IMAGE="${USER_LC}/${REPO_LC}:${TAG_LC}"
          echo "Pushing image => ${FULL_IMAGE}"

          docker tag "${LOCAL_IMAGE}" "${FULL_IMAGE}"
          docker push "${FULL_IMAGE}"

          echo "FULL_IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV

      - name: Commit training artifacts to repository
        shell: bash -l {0}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add artifacts/latest mlruns || true

          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: retrain model + update artifacts + docker image (CI)"
          git push
